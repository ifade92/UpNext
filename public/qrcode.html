<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fademasters Check-In QR Code</title>
  <style>
    body {
      background: #0D2B1A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      color: white;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    #qrcode { margin: 0 auto; }
    .shop-name {
      font-size: 22px;
      font-weight: 800;
      color: #0D2B1A;
      margin-top: 20px;
      letter-spacing: -0.5px;
    }
    .instruction {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
      line-height: 1.5;
    }
    .url {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
      word-break: break-all;
    }
    h2 {
      color: white;
      margin-bottom: 20px;
      font-size: 18px;
      opacity: 0.7;
    }
    .save-tip {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Fademasters Walk-In Check-In</h2>
  <div class="card">
    <div id="qrcode"></div>
    <div class="shop-name">✂️ Fademasters</div>
    <div class="instruction">Scan to join the walk-in queue</div>
    <div class="url">upnext-app.com/checkin?shop=test-shops&source=qr</div>
  </div>
  <div class="save-tip">Right-click the QR code → Save image to download</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://upnext-app.com/checkin?shop=test-shops&source=qr",
      width: 260,
      height: 260,
      colorDark: "#0D2B1A",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
