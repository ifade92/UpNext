<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UpNext – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #061410;
      --surface: #1A1A1A;
      --surface-2: #222222;
      --accent: #2ECC71;
      --accent-dark: #1BA355;
      --red: #FF453A;
      --text: #FFFFFF;
      --text-2: rgba(255,255,255,0.6);
      --text-3: rgba(255,255,255,0.35);
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px calc(32px + env(safe-area-inset-bottom));
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
    }

    /* ── Logo ── */
    .logo-mark {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .logo-shapes {
      display: flex;
      flex-direction: column;
      gap: 4.5px;
      align-items: flex-start;
    }
    .logo-dot       { width: 7px; height: 7px; border-radius: 50%; background: #2A4A35; }
    .logo-bar-wide  { width: 22px; height: 7px; border-radius: 2px; background: #2ECC71; }
    .logo-bar-short { width: 14px; height: 7px; border-radius: 2px; background: #2A4A35; }
    .logo-text {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: #8BA898; }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 14px;
      color: var(--text-2);
    }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #000;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    .error-msg {
      display: none;
      background: rgba(255,69,58,0.1);
      border: 1px solid rgba(255,69,58,0.3);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-3);
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
      margin-top: 20px;
    }
    .links a {
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .links span { font-size: 13px; color: var(--text-3); }

    /* ── Role selector ── */
    .role-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .role-tab {
      flex: 1;
      padding: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .role-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }
    .forgot-link a {
      font-size: 12px;
      color: var(--text-3);
      text-decoration: none;
    }
    .forgot-link a:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="header">
      <div class="logo-mark">
        <div class="logo-shapes">
          <div class="logo-dot"></div>
          <div class="logo-bar-wide"></div>
          <div class="logo-bar-short"></div>
        </div>
        <span class="logo-text">Up<span>Next</span></span>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to your UpNext account</p>
    </div>

    <!-- Role selector -->
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('owner')" id="tab-owner">Shop Owner</div>
      <div class="role-tab" onclick="setRole('barber')" id="tab-barber">Barber</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div class="forgot-link">
      <a href="#" onclick="resetPassword(); return false;">Forgot password?</a>
    </div>

    <button class="btn-primary" id="btn-signin" onclick="signIn()">Sign In</button>

    <div class="divider">or</div>

    <div class="links">
      <span>New shop owner? <a href="/signup">Create your shop →</a></span>
      <span>New barber? <a href="/join">Join a shop →</a></span>
    </div>

  </div>
</div>

<!-- Firebase SDK — compat build (same as signup page) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyAcCSUMXGSndEb9LmRBysTe-Rnbj6Z7O7Q",
    authDomain:        "upnext-4ec7a.firebaseapp.com",
    projectId:         "upnext-4ec7a",
    storageBucket:     "upnext-4ec7a.firebasestorage.app",
    messagingSenderId: "828337578393",
    appId:             "1:828337578393:web:41ffba3eae692c9d807308"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  let currentRole = 'owner';

  function setRole(role) {
    currentRole = role;
    document.getElementById('tab-owner').classList.toggle('active', role === 'owner');
    document.getElementById('tab-barber').classList.toggle('active', role === 'barber');
  }

  async function signIn() {
    const email    = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;
    const btn      = document.getElementById('btn-signin');
    const errEl    = document.getElementById('error-msg');

    // Reset error styling in case it was green from a password reset
    errEl.style.background = '';
    errEl.style.borderColor = '';
    errEl.style.color = '';
    errEl.classList.remove('visible');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      await auth.signInWithEmailAndPassword(email, password);
      // Success — redirect to the barber/owner dashboard
      window.location.href = '/barber';

    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Sign In';

      console.error('[UpNext] Sign-in error:', err.code, err.message);

      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        showError('Incorrect email or password. Please try again.');
      } else if (err.code === 'auth/too-many-requests') {
        showError('Too many failed attempts. Please try again later or reset your password.');
      } else if (err.code === 'auth/unauthorized-domain') {
        showError('This domain is not authorized. Add it in Firebase Console → Authentication → Settings → Authorized Domains.');
      } else if (err.code === 'auth/network-request-failed') {
        showError('Network error. Check your connection and try again.');
      } else {
        showError(`Sign-in failed (${err.code || 'unknown'}). Please try again.`);
      }
    }
  }

  async function resetPassword() {
    const email = document.getElementById('input-email').value.trim();
    if (!email) {
      showError('Enter your email address first, then tap "Forgot password?"');
      return;
    }
    try {
      await auth.sendPasswordResetEmail(email);
      showError('✓ Password reset email sent. Check your inbox.');
      document.getElementById('error-msg').style.background = 'rgba(46,204,113,0.1)';
      document.getElementById('error-msg').style.borderColor = 'rgba(46,204,113,0.3)';
      document.getElementById('error-msg').style.color = '#2ECC71';
    } catch (err) {
      showError('Could not send reset email. Check the address and try again.');
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') signIn();
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>
</body>
</html>
